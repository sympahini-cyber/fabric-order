<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FABRIC QR SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<style>
:root {
  /* SOKI Atami — 石・木・湯 */
  --ink-0:#080609;--ink-1:#0D0B10;--ink-2:#141219;--ink-3:#1B1922;
  --ink-4:#22202B;--ink-5:#2C2A36;--ink-6:#3A3846;--ink-7:#564E5E;
  --sand-1:#EDE6D8;--sand-2:#C6BBA8;--sand-3:#887C6C;--sand-4:#524A3C;
  --gold:#C0BCBA;--gold-hi:#D4D0CE;--gold-lo:#6A6462;
  --gold-10:rgba(192,188,186,.10);--gold-18:rgba(192,188,186,.18);
  --gold-30:rgba(192,188,186,.30);
  --ruby:#A04040;--ruby-10:rgba(160,64,64,.10);--ruby-30:rgba(160,64,64,.30);
  --sage:#4E7A5C;--sage-10:rgba(78,122,92,.10);
  --sb-w:252px;--hdr-h:56px;--r:5px;--rl:10px;--rxl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink-0);color:var(--sand-1);
  font-family:'Yu Gothic','游ゴシック','YuGothic','Inter','Helvetica Neue',Arial,'Hiragino Sans',sans-serif;
  font-size:13.5px;line-height:1.65;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sb-w);flex-shrink:0;background:var(--ink-1);
  border-right:1px solid var(--ink-5);display:flex;flex-direction:column;
  overflow:hidden;position:relative}
#sidebar::before{content:'';position:absolute;top:-80px;left:-80px;
  width:280px;height:280px;
  background:radial-gradient(circle,var(--gold-10) 0%,transparent 68%);pointer-events:none}
.sb-brand{padding:24px 22px 20px;border-bottom:1px solid var(--ink-5);
  display:flex;align-items:center;gap:14px;position:relative}
.sb-brand-text{display:flex;flex-direction:column;gap:2px}
.sb-brand-name{font-size:15px;font-weight:300;letter-spacing:.28em;font-family:'Cormorant Garamond',Georgia,serif}
.sb-brand-name em{font-style:italic;color:var(--gold);font-weight:400}
.sb-brand-sub{font-size:8.5px;letter-spacing:.22em;color:var(--ink-7);text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-sec{padding:18px 22px 5px;font-size:8.5px;letter-spacing:.22em;
  color:var(--ink-7);text-transform:uppercase}
.nav-list{list-style:none}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 22px;
  cursor:pointer;color:var(--sand-3);font-size:12.5px;letter-spacing:.02em;
  font-weight:400;transition:color .14s,background .14s;
  border-left:2px solid transparent;user-select:none}
.nav-item:hover{color:var(--sand-1);background:var(--ink-3)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);
  background:var(--gold-10);font-weight:500}
.nav-ic{width:15px;text-align:center;font-size:13px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-ic{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;font-weight:500;padding:1px 7px;
  border-radius:10px;background:var(--ink-4);color:var(--sand-3);
  border:1px solid var(--ink-5);min-width:22px;text-align:center}
.nav-item.active .nav-badge{background:var(--gold-18);color:var(--gold);border-color:var(--gold-30)}
.sb-footer{padding:14px 22px;border-top:1px solid var(--ink-5);
  font-size:10px;color:var(--ink-7);letter-spacing:.12em;display:flex;align-items:center;gap:8px}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);box-shadow:0 0 7px var(--sage);flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--ink-0)}
.pg-hdr{height:var(--hdr-h);padding:0 28px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--ink-4);
  background:var(--ink-1);flex-shrink:0;gap:16px}
.pg-title{display:flex;align-items:center;gap:12px;font-size:11px;font-weight:500;
  letter-spacing:.22em;color:var(--sand-3);text-transform:uppercase;white-space:nowrap}
.pg-rule{width:1px;height:18px;background:var(--ink-5)}
.pg-ic{color:var(--gold);font-size:14px}
.hdr-acts{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.pg-body{flex:1;overflow-y:auto;padding:28px}
.page{display:none;height:100%;flex-direction:column}
.page.active{display:flex;animation:pg-in .22s ease}
@keyframes pg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:22px;transition:border-color .18s}
.card:hover{border-color:var(--ink-5)}
.card-hd{font-size:9px;font-weight:600;letter-spacing:.22em;color:var(--ink-7);
  text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.card-hd::after{content:'';flex:1;height:1px;background:var(--ink-4)}
.card-feat{position:relative;overflow:hidden}
.card-feat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold-lo),var(--gold),var(--gold-lo))}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:20px 22px;position:relative;overflow:hidden;
  transition:border-color .18s,background .18s}
.stat-card:hover{border-color:var(--ink-6);background:var(--ink-3)}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;
  background:linear-gradient(90deg,var(--gold-30),transparent)}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:.2em;color:var(--ink-7);
  text-transform:uppercase;margin-bottom:10px}
.stat-val{font-size:34px;font-weight:200;color:var(--sand-1);letter-spacing:-.03em;line-height:1}
.stat-unit{font-size:12px;font-weight:400;color:var(--sand-3);margin-left:5px}
.stat-sub{font-size:10.5px;color:var(--sand-4);margin-top:6px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;
  border-radius:var(--r);font-size:12px;font-weight:500;letter-spacing:.03em;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-hi) 100%);
  color:#000;box-shadow:0 1px 8px rgba(200,168,74,.25)}
.btn-p:hover{background:linear-gradient(135deg,var(--gold-hi) 0%,var(--gold) 100%);
  box-shadow:0 2px 14px rgba(200,168,74,.40);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)}
.btn-s{background:var(--ink-4);color:var(--sand-2);border:1px solid var(--ink-5)}
.btn-s:hover{background:var(--ink-5);color:var(--sand-1);border-color:var(--ink-6)}
.btn-g{background:transparent;color:var(--sand-3);border:1px solid var(--ink-5)}
.btn-g:hover{color:var(--sand-1);border-color:var(--ink-6);background:var(--ink-3)}
.btn-d{background:var(--ruby-10);color:var(--ruby);border:1px solid var(--ruby-30)}
.btn-d:hover{background:var(--ruby);color:#fff;border-color:var(--ruby)}
.btn-xs{padding:4px 9px;font-size:11px}.btn-sm{padding:6px 12px;font-size:11.5px}
.inp{width:100%;background:var(--ink-3);border:1px solid var(--ink-5);
  border-radius:var(--r);color:var(--sand-1);font-size:13px;font-family:inherit;
  padding:8px 12px;outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--gold-30);box-shadow:0 0 0 3px var(--gold-10)}
.inp::placeholder{color:var(--ink-7)}.inp:hover:not(:focus){border-color:var(--ink-6)}
.inp-row{margin-bottom:16px}
.inp-lbl{display:block;font-size:10px;font-weight:600;letter-spacing:.16em;
  color:var(--sand-3);text-transform:uppercase;margin-bottom:7px}
.inp-hint{font-size:11px;color:var(--ink-7);margin-top:5px}
.tbl-wrap{border:1px solid var(--ink-4);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--ink-3);padding:10px 14px;font-size:9.5px;font-weight:600;
  letter-spacing:.18em;color:var(--ink-7);text-transform:uppercase;
  text-align:left;border-bottom:1px solid var(--ink-4);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--ink-3);transition:background .10s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--ink-3)}
tbody td{padding:10px 14px;font-size:12.5px;color:var(--sand-1)}
.td-mono{font-family:'SF Mono','Fira Code','Consolas',monospace;color:var(--gold);font-size:12px;letter-spacing:.03em}
.td-dim{color:var(--sand-3);font-size:12px}
#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:var(--ink-4);border:1px solid var(--ink-6);border-radius:var(--r);
  font-size:12px;color:var(--sand-1);box-shadow:0 6px 24px rgba(0,0,0,.5);
  animation:ti .18s ease;max-width:320px}
.toast.ok{border-color:rgba(106,158,130,.4);color:var(--sage)}
.toast.err{border-color:rgba(184,84,72,.4);color:var(--ruby)}
@keyframes ti{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
#modal-bg.on{display:flex}
.modal{background:var(--ink-2);border:1px solid var(--ink-5);border-radius:var(--rxl);
  padding:28px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.7);
  animation:mi .20s ease;max-height:90vh;overflow-y:auto}
.modal-wide{max-width:680px}
@keyframes mi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-ttl{font-size:14px;font-weight:500;letter-spacing:.04em;margin-bottom:20px;
  padding-bottom:14px;border-bottom:1px solid var(--ink-4)}
.modal-acts{display:flex;justify-content:flex-end;gap:8px;
  margin-top:20px;padding-top:14px;border-top:1px solid var(--ink-4)}
.cc{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);padding:20px;transition:all .16s}
.cc:hover{border-color:var(--ink-5);background:var(--ink-3)}
.cc.ac{border-color:var(--gold-30);background:var(--gold-10)}
.cc.ac:hover{border-color:var(--gold)}
.cc-name{font-size:14px;font-weight:500}.cc-client{font-size:12px;color:var(--sand-3);margin-top:3px}
.cc-meta{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--ink-7)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:3px;
  font-size:9.5px;font-weight:600;letter-spacing:.06em}
.tag-g{background:var(--gold-10);color:var(--gold);border:1px solid var(--gold-30)}
.tag-r{background:var(--ruby-10);color:var(--ruby);border:1px solid var(--ruby-30)}
.tag-gr{background:var(--sage-10);color:var(--sage);border:1px solid rgba(106,158,130,.3)}
.banner{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:18px 22px;display:flex;align-items:center;gap:18px;margin-bottom:22px}
.banner.warn{border-color:var(--gold-18);background:var(--gold-10)}
.b-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);box-shadow:0 0 8px var(--sage);flex-shrink:0}
.sl-row{display:grid;grid-template-columns:1fr 78px 90px auto;gap:8px;
  align-items:center;padding:9px 0;border-bottom:1px solid var(--ink-3)}
.sl-row:last-child{border-bottom:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 24px;text-align:center}
.empty-ic{font-size:32px;color:var(--ink-6);margin-bottom:14px}
.empty-txt{font-size:13px;color:var(--sand-4)}.empty-sub{font-size:12px;color:var(--ink-7);margin-top:6px}
.qa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.qa{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);
  padding:20px 14px 18px;cursor:pointer;text-align:center;transition:all .16s;
  position:relative;overflow:hidden}
.qa::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--gold-10) 0%,transparent 70%);
  opacity:0;transition:opacity .20s;pointer-events:none}
.qa:hover{border-color:var(--gold-30)}.qa:hover::after{opacity:1}
.qa-ic{font-size:22px;margin-bottom:10px;display:block;position:relative}
.qa-lbl{font-size:11px;letter-spacing:.06em;color:var(--sand-3);position:relative;font-weight:500}
/* QR Print grid */
.qr-grid-p{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.qr-cell{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);
  padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;transition:all .14s;position:relative;user-select:none}
.qr-cell:hover{border-color:var(--gold-30);background:var(--ink-3)}
.qr-cell.sel{border-color:var(--gold);background:var(--gold-10)}
.qr-cell.sel::before{content:'✓';position:absolute;top:6px;right:8px;
  font-size:10px;color:var(--gold);font-weight:600}
.qr-code{font-size:9px;color:var(--sand-3);text-align:center;font-family:'SF Mono','Consolas',monospace}
.qr-name{font-size:8px;color:var(--ink-7);text-align:center;overflow:hidden;max-width:100%;white-space:nowrap;text-overflow:ellipsis}
/* Inbox */
.inbox-card{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);
  padding:18px 20px;margin-bottom:10px;transition:border-color .16s}
.inbox-card:hover{border-color:var(--ink-5)}
/* Send label 2-col */
.lbl2-grid{display:grid;grid-template-columns:1fr 1fr;
  border:1px solid var(--ink-5);border-radius:var(--r);overflow:hidden}
.lbl2-cell{padding:14px 16px;border-right:1px solid var(--ink-4);border-bottom:1px solid var(--ink-4)}
.lbl2-cell:nth-child(2n){border-right:none}
.lbl-frow{display:flex;gap:8px;align-items:baseline;margin-bottom:5px}
.lbl-fkey{font-size:9px;color:var(--sand-4);min-width:80px;flex-shrink:0;letter-spacing:.02em}
.lbl-fval{font-size:11px;color:var(--sand-1)}
.lbl-fval.big{font-size:13px;font-weight:600;font-family:'SF Mono','Consolas',monospace;color:var(--gold)}
/* History */
.hist-card{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);
  padding:20px;margin-bottom:12px;transition:border-color .16s}
.hist-card:hover{border-color:var(--ink-5)}
/* Helpers */
.flex{display:flex}.flex-1{flex:1}.ic{align-items:center}.jb{justify-content:space-between}
.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.mb22{margin-bottom:22px}.mb28{margin-bottom:28px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.divider{height:1px;background:var(--ink-4);margin:18px 0}
.text-a{color:var(--gold)}.text-d{color:var(--sand-3)}
.text-xs{font-size:11px}.text-sm{font-size:12.5px}
.mono{font-family:'SF Mono','Consolas',monospace}
.chk{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-6)}
/* Print */
#print-area{display:none}
@media print{
  #sidebar,.pg-hdr,.no-print{display:none!important}
  body{background:#fff;color:#000}#app{display:block}
  #print-area{display:block!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:8mm}
}
</style>
</head>
<body>
<div id="app">

<!-- ════ SIDEBAR ════ -->
<nav id="sidebar">
  <div class="sb-brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <polygon points="17,3 31,17 17,31 3,17" stroke="#C8A84A" stroke-width="1.2" fill="none"/>
      <polygon points="17,9 25,17 17,25 9,17" fill="#C8A84A" fill-opacity="0.18"/>
      <polygon points="17,13 21,17 17,21 13,17" fill="#C8A84A" fill-opacity="0.55"/>
    </svg>
    <div class="sb-brand-text">
      <div class="sb-brand-name">FABRIC<em>QR</em></div>
      <div class="sb-brand-sub">Management System</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">Workspace</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="dashboard"><span class="nav-ic">&#x2B21;</span><span>ダッシュボード</span></li>
    </ul>
    <div class="sb-sec">Data</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="master"><span class="nav-ic">&#x229E;</span><span>マスタ管理</span><span class="nav-badge" id="bdg-m">0</span></li>
      <li class="nav-item" data-page="qrprint"><span class="nav-ic">&#x22A0;</span><span>QR 印刷</span></li>
    </ul>
    <div class="sb-sec">Operations</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="cases"><span class="nav-ic">&#x229F;</span><span>案件管理</span><span class="nav-badge" id="bdg-c">0</span></li>
      <li class="nav-item" data-page="sendprint"><span class="nav-ic">&#x22A1;</span><span>送付印刷</span></li>
      <li class="nav-item" data-page="history"><span class="nav-ic">&#x25D7;</span><span>送付履歴</span><span class="nav-badge" id="bdg-h">0</span></li>
      <li class="nav-item" data-page="inbox"><span class="nav-ic">&#x2709;</span><span>受信ボックス</span><span class="nav-badge" id="bdg-i">0</span></li>
    </ul>
    <div class="sb-sec">System</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="settings"><span class="nav-ic">&#x25C8;</span><span>設定</span></li>
    </ul>
  </div>
  <div class="sb-footer"><div class="sb-dot"></div><span>v4.0 &nbsp;&#183;&nbsp; 稼働中</span></div>
</nav>

<!-- ════ MAIN ════ -->
<main id="main">

  <!-- Dashboard -->
  <div id="page-dashboard" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x2B21;</span><span class="pg-rule"></span><span>Dashboard</span></div>
    </div>
    <div class="pg-body" id="dash-body"></div>
  </div>

  <!-- Master -->
  <div id="page-master" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x229E;</span><span class="pg-rule"></span><span>Master Data</span></div>
      <div class="hdr-acts">
        <button class="btn btn-g btn-sm" onclick="exportCSV()">&#x2193; CSV出力</button>
        <label class="btn btn-s btn-sm" style="cursor:pointer">&#x21BA; クリア取込<input type="file" accept=".csv,.xlsx,.xlsm" multiple style="display:none" onchange="importFiles(this,true)"></label>
        <label class="btn btn-s btn-sm" style="cursor:pointer">&#x2191; XLSX取込<input type="file" accept=".xlsx,.xlsm" multiple style="display:none" onchange="importFiles(this,false)"></label>
        <label class="btn btn-s btn-sm" style="cursor:pointer">&#x2191; CSV取込<input type="file" accept=".csv" multiple style="display:none" onchange="importFiles(this,false)"></label>
        <button class="btn btn-p btn-sm" onclick="openFabricModal(null)">&#xFF0B; 新規追加</button>
      </div>
    </div>
    <div class="pg-body">
      <div class="flex ic gap8 mb16">
        <input type="text" class="inp" id="mst-search" placeholder="品番・品名で検索..." oninput="renderMst()" style="max-width:300px">
        <span class="text-sm text-d" id="mst-cnt"></span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>品番</th><th>品名</th><th>生地巾</th><th>目付</th><th>混率</th><th>使用糸</th><th>備考</th><th></th>
          </tr></thead>
          <tbody id="mst-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- QR Print -->

<!-- ════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════ -->
<script>
'use strict';

/* ────────────────────────────────
   1. STATE & PERSISTENCE
──────────────────────────────── */
const K = {F:'fqms_fabrics', C:'fqms_cases', H:'fqms_history', S:'fqms_settings', I:'fqms_inbox'};

function load(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let fabrics  = load(K.F, []);
let cases    = load(K.C, []);
let hist     = load(K.H, []);
let inbox    = load(K.I, []);
let settings = load(K.S, {companyName:'', tantou:'', tel:'', fax:'', address:'', email:'', clientBaseUrl:'', endpointUrl:''});

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

/* ────────────────────────────────
   2. TOAST
──────────────────────────────── */
function toast(msg, type='') {
  const icons = {ok:'✓', err:'✕', '':'◦'};
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = '<span style="font-size:13px;flex-shrink:0">' + (icons[type]||'◦') + '</span><span>' + esc(msg) + '</span>';
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2800);
}

/* ────────────────────────────────
   3. MODAL (single slot)
──────────────────────────────── */
function openModal(html, wide) {
  const box = document.getElementById('modal-box');
  box.className = 'modal' + (wide ? ' modal-wide' : '');
  box.innerHTML = html;
  document.getElementById('modal-bg').classList.add('on');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('on'); }

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

/* ────────────────────────────────
   4. ESCAPE
──────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ────────────────────────────────
   5. NAVIGATION
──────────────────────────────── */
let current = 'dashboard';

function navigate(name) {
  current = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const pg = document.getElementById('page-' + name);
  if (pg) pg.classList.add('active');
  const ni = document.querySelector('[data-page="' + name + '"]');
  if (ni) ni.classList.add('active');

  const renders = {
    dashboard: renderDash,
    master: renderMst,
    qrprint: renderQRP,
    inbox: renderInbox,
    cases: renderCases,
    sendprint: renderSendPrint,
    history: renderHistory,
    settings: renderSettings,
  };
  (renders[name] || (() => {}))();
  updBadges();
}

document.querySelectorAll('.nav-item').forEach(n =>
  n.addEventListener('click', () => navigate(n.dataset.page))
);

function updBadges() {
  document.getElementById('bdg-m').textContent = fabrics.length;
  document.getElementById('bdg-c').textContent = cases.length;
  document.getElementById('bdg-h').textContent = hist.length;
  document.getElementById('bdg-i').textContent = inbox.length;
}

/* ────────────────────────────────
   6. CLIENT URL & QR GENERATION
──────────────────────────────── */
function clientUrl(f) {
  const base = (settings.clientBaseUrl || '').replace(/\/+$/, '');
  if (!base) return f.hinban; // fallback if URL not configured
  const p = new URLSearchParams();
  if (f.hinban)   p.set('id', f.hinban);
  if (f.hinmei)   p.set('nm', f.hinmei);
  if (f.haba)     p.set('w',  f.haba);
  if (f.me)       p.set('g',  f.me);
  if (f.konritsu) p.set('k',  f.konritsu);
  if (f.ito)      p.set('t',  f.ito);
  return base + '?' + p.toString();
}

function genQRSvg(data, size=72) {
  if (typeof qrcode === 'undefined')
    return '<div style="width:'+size+'px;height:'+size+'px;background:var(--ink-4);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink-7)">QR</div>';
  for (const t of [0,1,2,3,4,5]) {
    try {
      const q = qrcode(t, 'M'); q.addData(data); q.make();
      const n = q.getModuleCount(), cs = Math.max(1, Math.floor(size / n));
      return q.createSvgTag(cs, 0).replace('<svg', '<svg style="display:block;width:'+(cs*n)+'px;height:'+(cs*n)+'px"');
    } catch(e) {}
  }
  return '<div style="width:'+size+'px;height:'+size+'px;background:var(--ink-4);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ruby)">ERR</div>';
}

/* ────────────────────────────────
   7. DASHBOARD
──────────────────────────────── */
function renderDash() {
  document.getElementById('dash-body').innerHTML =
    '<div class="stats-row">'
    + '<div class="stat-card"><div class="stat-lbl">Master Items</div>'
    + '<div class="stat-val">' + fabrics.length + '<span class="stat-unit">品番</span></div>'
    + '<div class="stat-sub">生地マスタ登録数</div></div>'
    + '<div class="stat-card"><div class="stat-lbl">Active Cases</div>'
    + '<div class="stat-val">' + cases.length + '<span class="stat-unit">案件</span></div>'
    + '<div class="stat-sub">送付案件数</div></div>'
    + '<div class="stat-card"><div class="stat-lbl">Send History</div>'
    + '<div class="stat-val">' + hist.length + '<span class="stat-unit">件</span></div>'
    + '<div class="stat-sub">累計送付回数</div></div>'
    + '</div>'
    + '<div class="card-hd">Quick Actions</div>'
    + '<div class="qa-grid">'
    + _qa('&#x229E;','マスタ管理','master')
    + _qa('&#x22A0;','QR 印刷','qrprint')
    + _qa('&#x229F;','案件管理','cases')
    + _qa('&#x22A1;','送付印刷','sendprint')
    + _qa('&#x25D7;','送付履歴','history')
    + _qa('&#x2709;','受信ボックス','inbox')
    + '</div>';
}

function _qa(ic, lbl, page) {
  return '<div class="qa" onclick="navigate(\''+page+'\')">'
    + '<span class="qa-ic" style="color:var(--gold)">'+ic+'</span>'
    + '<div class="qa-lbl">'+esc(lbl)+'</div></div>';
}

/* ────────────────────────────────
   8. MASTER TABLE
──────────────────────────────── */
function renderMst() {
  const q = (document.getElementById('mst-search').value || '').toLowerCase();
  const list = fabrics.filter(f =>
    f.hinban.toLowerCase().includes(q) || (f.hinmei||'').toLowerCase().includes(q)
  );

  const tbody = document.getElementById('mst-tbody');
  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--ink-7);padding:48px;letter-spacing:.06em">'
      + (q ? '検索結果なし' : 'データなし') + '</td></tr>';
  } else {
    tbody.innerHTML = list.map(f =>
      '<tr>'
      + '<td><span class="td-mono">' + esc(f.hinban) + '</span></td>'
      + '<td>' + esc(f.hinmei) + '</td>'
      + '<td class="td-dim">' + esc(f.haba) + '</td>'
      + '<td class="td-dim">' + esc(f.me) + '</td>'
      + '<td class="td-dim">' + esc(f.konritsu) + '</td>'
      + '<td class="td-dim">' + esc(f.ito) + '</td>'
      + '<td class="td-dim">' + esc(f.bikou) + '</td>'
      + '<td><div class="flex gap6">'
      + '<button class="btn btn-s btn-xs" data-action="edit" data-id="'+esc(f.hinban)+'">編集</button>'
      + '<button class="btn btn-d btn-xs" data-action="del" data-id="'+esc(f.hinban)+'">削除</button>'
      + '</div></td>'
      + '</tr>'
    ).join('');
  }
  document.getElementById('mst-cnt').textContent = list.length + ' / ' + fabrics.length + ' 件';
}

document.getElementById('mst-tbody').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  if (btn.dataset.action === 'edit') openFabricModal(btn.dataset.id);
  if (btn.dataset.action === 'del')  deleteFabric(btn.dataset.id);
});

/* ────────────────────────────────
   9. FABRIC MODAL
──────────────────────────────── */
function openFabricModal(hinban) {
  const f = hinban ? fabrics.find(x => x.hinban === hinban) : null;
  const v = k => f ? esc(f[k]||'') : '';
  openModal(
    '<div class="modal-ttl">' + (f ? '生地編集' : '生地登録') + '</div>'
    + '<div class="g2 mb16">'
    + _ir('品番', 'f-hinban', v('hinban'), '例: AB-001', !f)
    + _ir('品名', 'f-hinmei', v('hinmei'), '例: ストレッチダブル')
    + '</div>'
    + '<div class="g2 mb16">'
    + _ir('生地巾', 'f-haba', v('haba'), '例: 83W')
    + _ir('目付', 'f-me', v('me'), '例: 524g/m')
    + '</div>'
    + '<div class="g2 mb16">'
    + _ir('混率', 'f-konritsu', v('konritsu'), '例: cotton43 Tencel57')
    + _ir('使用糸', 'f-ito', v('ito'), '例: 綿糸 / ポリ糸')
    + '</div>'
    + '<div class="inp-row">'
    + '<label class="inp-lbl">備考</label>'
    + '<textarea class="inp" id="f-bikou" rows="2" placeholder="自由記入">' + v('bikou') + '</textarea>'
    + '</div>'
    + '<div class="modal-acts">'
    + '<button class="btn btn-s btn-sm" onclick="closeModal()">キャンセル</button>'
    + '<button class="btn btn-p btn-sm" onclick="saveFabric(' + (f ? "'"+esc(f.hinban)+"'" : 'null') + ')">保存</button>'
    + '</div>'
  );
  if (!f) setTimeout(() => document.getElementById('f-hinban')?.focus(), 50);
}

function _ir(lbl, id, val, ph, required) {
  return '<div class="inp-row" style="margin-bottom:0">'
    + '<label class="inp-lbl">' + lbl + (required ? ' *' : '') + '</label>'
    + '<input type="text" class="inp" id="' + id + '" value="' + val + '" placeholder="' + esc(ph) + '">'
    + '</div>';
}

function saveFabric(originalHinban) {
  const hinban = (document.getElementById('f-hinban').value || '').trim();
  if (!hinban) { toast('品番を入力してください', 'err'); return; }
  const data = {
    hinban,
    hinmei:   (document.getElementById('f-hinmei').value || '').trim(),
    haba:     (document.getElementById('f-haba').value || '').trim(),
    me:       (document.getElementById('f-me').value || '').trim(),
    konritsu: (document.getElementById('f-konritsu').value || '').trim(),
    ito:      (document.getElementById('f-ito').value || '').trim(),
    bikou:    (document.getElementById('f-bikou').value || '').trim(),
  };
  if (originalHinban) {
    const i = fabrics.findIndex(f => f.hinban === originalHinban);
    if (i >= 0) fabrics[i] = data;
    toast('更新しました', 'ok');
  } else {
    if (fabrics.some(f => f.hinban === hinban)) { toast('品番が重複しています', 'err'); return; }
    fabrics.push(data);
    toast('登録しました', 'ok');
  }
  save(K.F, fabrics);
  closeModal();
  renderMst();
  updBadges();
}

function deleteFabric(hinban) {
  if (!confirm('品番「' + hinban + '」を削除しますか？')) return;
  fabrics = fabrics.filter(f => f.hinban !== hinban);
  save(K.F, fabrics);
  renderMst();
  updBadges();
  toast('削除しました');
}

/* ────────────────────────────────
   10. IMPORT / EXPORT
──────────────────────────────── */
function importFiles(input, clear) {
  const files = Array.from(input.files); if (!files.length) return; input.value = '';
  // If clearing, wipe now and treat all files as add-mode
  if (clear) { fabrics = []; save(K.F, fabrics); }
  files.forEach(file => {
    if (/\.xlsx?$|\.xlsm$/i.test(file.name)) {
      importXLSX(file, false);
    } else {
      importCSVFile(file, false);
    }
  });
  if (clear) toast('クリア取込: ' + files.length + ' ファイル処理中', '');
}

function importCSVFile(file, clear) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { toast('データがありません', 'err'); return; }
      const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').replace(/^﻿/, ''));
      const alias = {
        hinban:   ['品番','hinban'], hinmei: ['品名','hinmei'],
        haba: ['生地巾','haba'], me: ['目付','me'],
        konritsu: ['混率','konritsu'], ito: ['使用糸','ito'], bikou: ['備考','bikou']
      };
      const col = {};
      Object.entries(alias).forEach(([k, alts]) => {
        for (const a of alts) { const i = header.findIndex(h => h === a); if (i >= 0) { col[k] = i; break; } }
      });
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const c = _parseCSVLine(lines[i]);
        const hinban = (c[col.hinban] || '').trim(); if (!hinban) continue;
        rows.push({
          hinban, hinmei: (c[col.hinmei]||'').trim(), haba: (c[col.haba]||'').trim(),
          me: (c[col.me]||'').trim(), konritsu: (c[col.konritsu]||'').trim(),
          ito: (c[col.ito]||'').trim(), bikou: (c[col.bikou]||'').trim(),
        });
      }
      _applyImport(rows, clear);
    } catch(e) { toast('CSV読込エラー: '+e.message, 'err'); }
  };
  reader.readAsText(file, 'UTF-8');
}

function _parseCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) { if (c==='"'&&line[i+1]==='"'){cur+='"';i++;} else if(c==='"')inQ=false; else cur+=c; }
    else { if(c==='"')inQ=true; else if(c===','){res.push(cur);cur='';} else cur+=c; }
  }
  res.push(cur); return res;
}

/* XLSX 仕様書準拠: シート「印刷」のみ、A1:F8, セルマッピング通り */
function importXLSX(file, clear) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const sn = wb.SheetNames.find(n => n === '印刷');
      if (!sn) { toast('シート名「印刷」が見つかりません', 'err'); return; }
      const ws = wb.Sheets[sn];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, range:'A1:F8'});
      const clean = v => (v===null||v===undefined||v===0||v==='0') ? '' : String(v).trim();

      const hinban = clean(rows[2]?.[2]); // C3
      if (!hinban) { toast('品番(C3)が空のためスキップ', 'err'); return; }
      const hinmei = clean(rows[3]?.[2]); // C4
      const ito1 = clean(rows[4]?.[2]), ito2 = clean(rows[4]?.[4]);
      const ito = [ito1,ito2].filter(Boolean).join(' / ');
      let haba = clean(rows[5]?.[2]);
      if (haba && !/[Ww]/.test(haba)) haba += 'W';
      let me = '';
      const meRaw = clean(rows[5]?.[4]);
      if (meRaw) { const n = parseFloat(meRaw); if (!isNaN(n)&&n!==0) me = n+'g/m'; }
      const k1 = clean(rows[6]?.[2]), k2 = clean(rows[6]?.[4]);
      const konritsu = [k1,k2].filter(Boolean).join(' ');

      _applyImport([{hinban,hinmei,haba,me,konritsu,ito,bikou:''}], clear);
    } catch(e) { toast('XLSX読込エラー: '+e.message, 'err'); }
  };
  reader.readAsBinaryString(file);
}

function _applyImport(rows, clear) {
  if (clear) {
    fabrics = rows;
    toast('クリア取込完了: ' + rows.length + ' 件', 'ok');
  } else {
    let added = 0, updated = 0;
    rows.forEach(d => {
      const i = fabrics.findIndex(f => f.hinban === d.hinban);
      if (i >= 0) { fabrics[i] = d; updated++; } else { fabrics.push(d); added++; }
    });
    toast(added + '件追加、' + updated + '件更新', 'ok');
  }
  save(K.F, fabrics);
  renderMst();
  updBadges();
}

function exportCSV() {
  if (!fabrics.length) { toast('データがありません', 'err'); return; }
  const hdr = '品番,品名,生地巾,目付,混率,使用糸,備考';
  const rows = fabrics.map(f =>
    [f.hinban,f.hinmei,f.haba,f.me,f.konritsu,f.ito,f.bikou]
      .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(',')
  );
  const blob = new Blob(['﻿'+hdr+'\n'+rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'fabric_master.csv'; a.click();
  toast('CSV出力しました', 'ok');
}

/* ────────────────────────────────
   11. QR PRINT
──────────────────────────────── */
const selectedQR = new Set();

function renderQRP() {
  const q = (document.getElementById('qr-search').value || '').toLowerCase();
  const list = fabrics.filter(f =>
    f.hinban.toLowerCase().includes(q) || (f.hinmei||'').toLowerCase().includes(q)
  );
  const wrap = document.getElementById('qr-grid-wrap');
  if (!list.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-ic">&#x22A0;</div>'
      + '<div class="empty-txt">生地データがありません</div></div>';
  } else {
    wrap.innerHTML = '<div class="qr-grid-p">'
      + list.map(f => {
        const sel = selectedQR.has(f.hinban);
        return '<div class="qr-cell ' + (sel ? 'sel' : '') + '" data-hinban="' + esc(f.hinban) + '">'
          + genQRSvg(clientUrl(f), 60)
          + '<div class="qr-code">' + esc(f.hinban) + '</div>'
          + '<div class="qr-name">' + esc(f.hinmei||'') + '</div>'
          + '</div>';
      }).join('')
      + '</div>';
  }
  document.getElementById('qr-sel-cnt').textContent = selectedQR.size ? selectedQR.size + ' 件選択中' : '';
  _updateQRPreview();
}

document.getElementById('qr-grid-wrap').addEventListener('click', e => {
  const cell = e.target.closest('.qr-cell'); if (!cell) return;
  const id = cell.dataset.hinban;
  selectedQR.has(id) ? selectedQR.delete(id) : selectedQR.add(id);
  renderQRP();
});

function selectAllQR(sel) {
  fabrics.forEach(f => sel ? selectedQR.add(f.hinban) : selectedQR.delete(f.hinban));
  renderQRP();
}

function _updateQRPreview() {
  const area = document.getElementById('qr-preview-area');
  const wrap = document.getElementById('qr-preview-labels');
  if (!selectedQR.size) { area.style.display = 'none'; return; }

function _buildLabel(f) {

function _di2(lbl, val) {

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action^="inbox-"]'); if (!btn) return;
  const id = btn.dataset.id;
  if (btn.dataset.action === 'inbox-del') {
    inbox = inbox.filter(x => x.id !== id);
    save(K.I, inbox); renderInbox(); updBadges(); toast('削除しました');
  }
});

async function fetchInbox() {
  const ep = settings.endpointUrl;
  if (!ep) { toast('設定でエンドポイントURLを入力してください', 'err'); navigate('settings'); return; }
  try {
    const r = await fetch(ep + (ep.includes('?') ? '&' : '?') + 'action=list&t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!Array.isArray(data)) throw new Error('レスポンス形式エラー');
    let added = 0;
    const newlyAdded = [];
    data.forEach(item => {
      if (item.id && !inbox.find(x => x.id === item.id)) {
        inbox.push({...item});
        newlyAdded.push(item);
        added++;
      }
    });
    save(K.I, inbox);
    toast(added ? added + '件の新着を取得しました' : '新着なし', added ? 'ok' : '');
    if (newlyAdded.length > 0) autoCreateCasesFromInbox(newlyAdded);
    renderInbox(); updBadges();
  } catch(e) { toast('取得エラー: ' + e.message, 'err'); }
}

function autoCreateCasesFromInbox(newItems) {
  // Group incoming submissions by sender name (fallback to company, then '未登録')
  const groups = {};
  newItems.forEach(item => {
    const key = (item.name || item.company || '').trim() || '未登録';
    if (!groups[key]) {
      groups[key] = { name: item.name||'', company: item.company||'', mobile: item.mobile||'', mail: item.mail||'', items: [] };
    }
    // Support both new multi-item format {items:[...]} and legacy single-item {hinban,...}
    const fabItems = (item.items && item.items.length)
      ? item.items
      : (item.hinban ? [{hinban: item.hinban, qty: item.qty||1, memo: ''}] : []);
    fabItems.forEach(fi => {
      if (fi.hinban) groups[key].items.push({hinban: fi.hinban, qty: fi.qty||1, memo: fi.memo||''});
    });
  });

  let casesCreated = 0;
  Object.entries(groups).forEach(([key, g]) => {
    // Find existing case for this sender (match by case name or company atesaki)
    let existing = cases.find(c =>
      c.name === key || (g.company && c.atesaki === g.company)
    );
    if (existing) {
      // Merge items — avoid duplicate hinban
      g.items.forEach(ni => {
        if (!existing.items.find(ei => ei.hinban === ni.hinban)) {
          existing.items.push(ni);
        }
      });
    } else {
      const contactMemo = [
        g.mobile ? 'Mobile: ' + g.mobile : '',
        g.mail   ? 'Mail: '   + g.mail   : '',
      ].filter(Boolean).join(' / ');
      cases.push({
        id: genId(),
        name: key,
        atesaki: g.company || g.name,
        memo: contactMemo,
        items: g.items,
        createdAt: new Date().toISOString(),
      });
      casesCreated++;
    }
  });
  save(K.C, cases);
  if (casesCreated > 0) toast(casesCreated + '件の案件を自動作成しました', 'ok');
  updBadges();
}

function renderCaseItems() {
  const el = document.getElementById('ci-list'); if (!el) return;
  el.innerHTML = caseItems.map((item, i) => {
    const opts = fabrics.map(f =>
      '<option value="'+esc(f.hinban)+'" '+(f.hinban===item.hinban?'selected':'')+'>'
      + esc(f.hinban) + (f.hinmei ? ' — '+esc(f.hinmei) : '') + '</option>'
    ).join('');

      + '<select class="inp" style="padding:6px 8px;font-size:12px" onchange="caseItems['+i+'].hinban=this.value">'
      + '<option value="">品番選択</option>' + opts + '</select>'
      + '<input type="number" class="inp" min="1" value="'+item.qty+'" style="text-align:right;padding:6px 8px;font-size:12px" onchange="caseItems['+i+'].qty=Math.max(1,parseInt(this.value)||1)">'
      + '<input type="text" class="inp" value="'+esc(item.memo)+'" placeholder="メモ" style="padding:6px 8px;font-size:12px" onchange="caseItems['+i+'].memo=this.value">'
      + '<button class="btn btn-d btn-xs" style="padding:5px 7px" onclick="removeCaseItem('+i+')">✕</button>'
      + '</div>';
  }).join('');
}

function addCaseItem() { caseItems.push({hinban:'',qty:1,memo:''}); renderCaseItems(); }
function removeCaseItem(i) {
  caseItems.splice(i, 1);
  if (!caseItems.length) caseItems.push({hinban:'',qty:1,memo:''});
  renderCaseItems();
}

function saveCase() {
  const name = (document.getElementById('c-name').value||'').trim();
  if (!name) { toast('案件名を入力してください', 'err'); return; }
  const data = {
    id: editingCaseId || genId(),
    name,
    atesaki: (document.getElementById('c-atesaki').value||'').trim(),
    memo:    (document.getElementById('c-memo').value||'').trim(),
    items:   caseItems.filter(i => i.hinban),
    createdAt: editingCaseId ? (cases.find(c => c.id === editingCaseId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
  };
  if (editingCaseId) {
    const i = cases.findIndex(c => c.id === editingCaseId); if (i >= 0) cases[i] = data;
