<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FABRIC QR SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink-0:#050505;--ink-1:#0c0c0c;--ink-2:#131313;--ink-3:#1a1a1a;
  --ink-4:#222222;--ink-5:#2c2c2c;--ink-6:#383838;--ink-7:#4a4a4a;
  --sand-1:#f0ece6;--sand-2:#c4bcb2;--sand-3:#857d73;--sand-4:#514840;
  --gold:#C8A84A;--gold-hi:#E4C46A;--gold-lo:#A08830;
  --gold-10:rgba(200,168,74,.10);--gold-18:rgba(200,168,74,.18);
  --gold-30:rgba(200,168,74,.30);
  --ruby:#B85448;--ruby-10:rgba(184,84,72,.10);--ruby-30:rgba(184,84,72,.30);
  --sage:#6A9E82;--sage-10:rgba(106,158,130,.10);
  --sb-w:252px;--hdr-h:56px;--r:5px;--rl:10px;--rxl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--ink-0);color:var(--sand-1);
  font-family:'Inter','Helvetica Neue',Arial,'Hiragino Sans','Yu Gothic UI',sans-serif;
  font-size:13.5px;line-height:1.65;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sb-w);flex-shrink:0;background:var(--ink-1);
  border-right:1px solid var(--ink-5);display:flex;flex-direction:column;
  overflow:hidden;position:relative}
#sidebar::before{content:'';position:absolute;top:-80px;left:-80px;
  width:280px;height:280px;
  background:radial-gradient(circle,var(--gold-10) 0%,transparent 68%);pointer-events:none}
.sb-brand{padding:24px 22px 20px;border-bottom:1px solid var(--ink-5);
  display:flex;align-items:center;gap:14px;position:relative}
.sb-brand-text{display:flex;flex-direction:column;gap:2px}
.sb-brand-name{font-size:14px;font-weight:300;letter-spacing:.28em}
.sb-brand-name em{font-style:normal;color:var(--gold);font-weight:600}
.sb-brand-sub{font-size:8.5px;letter-spacing:.22em;color:var(--ink-7);text-transform:uppercase}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-sec{padding:18px 22px 5px;font-size:8.5px;letter-spacing:.22em;
  color:var(--ink-7);text-transform:uppercase}
.nav-list{list-style:none}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 22px;
  cursor:pointer;color:var(--sand-3);font-size:12.5px;letter-spacing:.02em;
  font-weight:400;transition:color .14s,background .14s;
  border-left:2px solid transparent;user-select:none}
.nav-item:hover{color:var(--sand-1);background:var(--ink-3)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);
  background:var(--gold-10);font-weight:500}
.nav-ic{width:15px;text-align:center;font-size:13px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-ic{opacity:1}
.nav-badge{margin-left:auto;font-size:10px;font-weight:500;padding:1px 7px;
  border-radius:10px;background:var(--ink-4);color:var(--sand-3);
  border:1px solid var(--ink-5);min-width:22px;text-align:center}
.nav-item.active .nav-badge{background:var(--gold-18);color:var(--gold);border-color:var(--gold-30)}
.sb-footer{padding:14px 22px;border-top:1px solid var(--ink-5);
  font-size:10px;color:var(--ink-7);letter-spacing:.12em;display:flex;align-items:center;gap:8px}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--sage);box-shadow:0 0 7px var(--sage);flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--ink-0)}
.pg-hdr{height:var(--hdr-h);padding:0 28px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--ink-4);
  background:var(--ink-1);flex-shrink:0;gap:16px}
.pg-title{display:flex;align-items:center;gap:12px;font-size:11px;font-weight:500;
  letter-spacing:.22em;color:var(--sand-3);text-transform:uppercase;white-space:nowrap}
.pg-rule{width:1px;height:18px;background:var(--ink-5)}
.pg-ic{color:var(--gold);font-size:14px}
.hdr-acts{display:flex;gap:8px;align-items:center;flex-shrink:0}
.pg-body{flex:1;overflow-y:auto;padding:28px}
.page{display:none;height:100%;flex-direction:column}
.page.active{display:flex;animation:pg-in .22s ease}
@keyframes pg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:22px;transition:border-color .18s}
.card:hover{border-color:var(--ink-5)}
.card-hd{font-size:9px;font-weight:600;letter-spacing:.22em;color:var(--ink-7);
  text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.card-hd::after{content:'';flex:1;height:1px;background:var(--ink-4)}
.card-feat{position:relative;overflow:hidden}
.card-feat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold-lo),var(--gold),var(--gold-lo))}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:20px 22px;position:relative;overflow:hidden;
  transition:border-color .18s,background .18s}
.stat-card:hover{border-color:var(--ink-6);background:var(--ink-3)}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;
  background:linear-gradient(90deg,var(--gold-30),transparent)}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:.2em;color:var(--ink-7);
  text-transform:uppercase;margin-bottom:10px}
.stat-val{font-size:34px;font-weight:200;color:var(--sand-1);letter-spacing:-.03em;line-height:1}
.stat-unit{font-size:12px;font-weight:400;color:var(--sand-3);margin-left:5px}
.stat-sub{font-size:10.5px;color:var(--sand-4);margin-top:6px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;
  border-radius:var(--r);font-size:12px;font-weight:500;letter-spacing:.03em;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-p{background:linear-gradient(135deg,var(--gold) 0%,var(--gold-hi) 100%);
  color:#000;box-shadow:0 1px 8px rgba(200,168,74,.25)}
.btn-p:hover{background:linear-gradient(135deg,var(--gold-hi) 0%,var(--gold) 100%);
  box-shadow:0 2px 14px rgba(200,168,74,.40);transform:translateY(-1px)}
.btn-p:active{transform:translateY(0)
}
.btn-s{background:var(--ink-4);color:var(--sand-2);border:1px solid var(--ink-5)}
.btn-s:hover{background:var(--ink-5);color:var(--sand-1);border-color:var(--ink-6)}
.btn-g{background:transparent;color:var(--sand-3);border:1px solid var(--ink-5)}
.btn-g:hover{color:var(--sand-1);border-color:var(--ink-6);background:var(--ink-3)}
.btn-d{background:var(--ruby-10);color:var(--ruby);border:1px solid var(--ruby-30)}
.btn-d:hover{background:var(--ruby);color:#fff;border-color:var(--ruby)}
.btn-xs{padding:4px 9px;font-size:11px}.btn-sm{padding:6px 12px;font-size:11.5px}
.inp{width:100%;background:var(--ink-3);border:1px solid var(--ink-5);
  border-radius:var(--r);color:var(--sand-1);font-size:13px;font-family:inherit;
  padding:8px 12px;outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--gold-30);box-shadow:0 0 0 3px var(--gold-10)}
.inp::placeholder{color:var(--ink-7)}.inp:hover:not(:focus){border-color:var(--ink-6)}
.inp-row{margin-bottom:16px}
.inp-lbl{display:block;font-size:10px;font-weight:600;letter-spacing:.16em;
  color:var(--sand-3);text-transform:uppercase;margin-bottom:7px}
.inp-hint{font-size:11px;color:var(--ink-7);margin-top:5px}
.tbl-wrap{border:1px solid var(--ink-4);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--ink-3);padding:10px 14px;font-size:9.5px;font-weight:600;
  letter-spacing:.18em;color:var(--ink-7);text-transform:uppercase;
  text-align:left;border-bottom:1px solid var(--ink-4);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--ink-3);transition:background .10s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--ink-3)}
tbody td{padding:10px 14px;font-size:12.5px;color:var(--sand-1)}
.td-mono{font-family:'SF Mono','Fira Code','Consolas',monospace;color:var(--gold);font-size:12px;letter-spacing:.03em}
.td-dim{color:var(--sand-3);font-size:12px}
.dz{border:1px dashed var(--ink-6);border-radius:var(--rxl);padding:54px 24px;
  text-align:center;cursor:pointer;transition:all .20s;background:var(--ink-2);
  position:relative;overflow:hidden}
.dz::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--gold-10) 0%,transparent 70%);
  opacity:0;transition:opacity .20s;pointer-events:none}
.dz:hover::before,.dz.over::before{opacity:1}
.dz:hover,.dz.over{border-color:var(--gold-30)}
.qr-grid{display:grid;grid-template-columns:repeat(5,1fr);
  border:1px solid var(--ink-5);border-radius:var(--r);overflow:hidden}
.qr-cell{padding:12px 8px;display:flex;flex-direction:column;align-items:center;
  gap:6px;border-right:1px solid var(--ink-4);border-bottom:1px solid var(--ink-4);transition:background .12s}
.qr-cell:hover{background:var(--ink-3)}.qr-cell:nth-child(5n){border-right:none}
.qr-code{font-family:'SF Mono','Consolas',monospace;font-size:9px;color:var(--sand-3);
  text-align:center;word-break:break-all}
.qr-name{font-size:8px;color:var(--ink-7);text-align:center;overflow:hidden;max-width:100%;white-space:nowrap;text-overflow:ellipsis}
/* スワッチラベル プレビュー */
.lbl2-grid{display:flex;flex-direction:column;border:1px solid var(--ink-5);border-radius:var(--r);overflow:hidden}
.lbl2-sep{text-align:center;font-size:10px;letter-spacing:0;padding:2px 0;background:var(--ink-3);color:var(--sand-4);overflow:hidden;white-space:nowrap;border-bottom:1px solid var(--ink-4)}
.lbl2-cell{display:flex;border-bottom:1px solid var(--ink-4)}
.lbl2-cell-info{flex:0 0 65%;padding:6px 10px}
.lbl2-cell-swatch{flex:0 0 35%;border-left:1px solid var(--ink-5);display:flex;align-items:center;justify-content:center;color:var(--sand-6);font-size:8px;letter-spacing:.1em;background:var(--ink-2)}
.lbl-frow{display:flex;gap:4px;align-items:baseline;margin-bottom:3px;border-bottom:1px solid var(--ink-4);padding-bottom:3px}
.lbl-fkey{font-size:9px;color:var(--sand-4);min-width:72px;flex-shrink:0;letter-spacing:.02em}
.lbl-fval{font-size:10px;color:var(--sand-1)}
/* 送付履歴カード */
.hist-card{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);padding:20px}
.hist-card:hover{border-color:var(--ink-5)}

#toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:var(--ink-4);border:1px solid var(--ink-6);border-radius:var(--r);
  font-size:12px;color:var(--sand-1);box-shadow:0 6px 24px rgba(0,0,0,.5);
  animation:ti .18s ease;max-width:320px}
.toast.ok{border-color:rgba(106,158,130,.4);color:var(--sage)}
.toast.err{border-color:rgba(184,84,72,.4);color:var(--ruby)}
@keyframes ti{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
#modal-bg.on{display:flex}
.modal{background:var(--ink-2);border:1px solid var(--ink-5);border-radius:var(--rxl);
  padding:28px;width:100%;max-width:468px;box-shadow:0 20px 60px rgba(0,0,0,.7);
  animation:mi .20s ease}
@keyframes mi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-ttl{font-size:14px;font-weight:500;letter-spacing:.04em;margin-bottom:20px}
.modal-acts{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.cc{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);padding:20px;transition:all .16s}
.cc:hover{border-color:var(--ink-5);background:var(--ink-3)}
.cc.ac{border-color:var(--gold-30);background:var(--gold-10)}
.cc.ac:hover{border-color:var(--gold)}
.cc-name{font-size:14px;font-weight:500}.cc-client{font-size:12px;color:var(--sand-3);margin-top:3px}
.cc-meta{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--ink-7)}
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:3px;
  font-size:9.5px;font-weight:600;letter-spacing:.06em}
.tag-g{background:var(--gold-10);color:var(--gold);border:1px solid var(--gold-30)}
.tag-gr{background:var(--sage-10);color:var(--sage);border:1px solid rgba(106,158,130,.3)}
.qa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.qa{background:var(--ink-2);border:1px solid var(--ink-4);border-radius:var(--rl);
  padding:20px 14px 18px;cursor:pointer;text-align:center;transition:all .16s;
  position:relative;overflow:hidden}
.qa::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--gold-10) 0%,transparent 70%);
  opacity:0;transition:opacity .20s;pointer-events:none}
.qa:hover{border-color:var(--gold-30)}.qa:hover::after{opacity:1}
.qa-ic{font-size:22px;margin-bottom:10px;display:block;position:relative}
.qa-lbl{font-size:11px;letter-spacing:.06em;color:var(--sand-3);position:relative;font-weight:500}
.banner{background:var(--ink-2);border:1px solid var(--ink-4);
  border-radius:var(--rl);padding:18px 22px;display:flex;align-items:center;gap:18px;margin-bottom:22px}
.banner.warn{border-color:var(--gold-18);background:var(--gold-10)}
.b-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);box-shadow:0 0 8px var(--sage);flex-shrink:0}
.sl-row{display:grid;grid-template-columns:1fr 78px 90px auto;gap:8px;
  align-items:center;padding:9px 0;border-bottom:1px solid var(--ink-3)}
.sl-row:last-child{border-bottom:none}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 24px;text-align:center}
.empty-ic{font-size:32px;color:var(--ink-6);margin-bottom:14px}
.empty-txt{font-size:13px;color:var(--sand-4)}.empty-sub{font-size:12px;color:var(--ink-7);margin-top:6px}
.flex{display:flex}.flex-1{flex:1}.ic{align-items:center}.jb{justify-content:space-between}
.gap6{gap:6px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.mb22{margin-bottom:22px}.mb28{margin-bottom:28px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.divider{height:1px;background:var(--ink-4);margin:18px 0}
.text-a{color:var(--gold)}.text-d{color:var(--sand-3)}
.text-xs{font-size:11px}.text-sm{font-size:12.5px}
.mono{font-family:'SF Mono','Consolas',monospace}
.chk{width:14px;height:14px;cursor:pointer;accent-color:var(--gold)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink-5);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-6)}
@media print{#sidebar,.pg-hdr,.no-print{display:none!important}
  body{background:white;color:black}#app{display:block}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<div id="app">

<nav id="sidebar">
  <div class="sb-brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <polygon points="17,3 31,17 17,31 3,17" stroke="#C8A84A" stroke-width="1.2" fill="none"\/>
      <polygon points="17,9 25,17 17,25 9,17" fill="#C8A84A" fill-opacity="0.18"\/>
      <polygon points="17,13 21,17 17,21 13,17" fill="#C8A84A" fill-opacity="0.55"\/>
    </svg>
    <div class="sb-brand-text">
      <div class="sb-brand-name">FABRIC<em>QR</em></div>
      <div class="sb-brand-sub">Management System</div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="sb-sec">Workspace</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="dashboard"><span class="nav-ic">&#x2B21;</span><span>ダッシュボード</span></li>
    </ul>
    <div class="sb-sec">Data</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="master"><span class="nav-ic">&#x229E;</span><span>マスタ管理</span><span class="nav-badge" id="bdg-m">0</span></li>
      <li class="nav-item" data-page="qrprint"><span class="nav-ic">&#x22A0;</span><span>QR 印刷</span></li>
    </ul>
    <div class="sb-sec">Operations</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="cases"><span class="nav-ic">&#x229F;</span><span>案件管理</span><span class="nav-badge" id="bdg-c">0</span></li>
      <li class="nav-item" data-page="labels"><span class="nav-ic">&#x22A1;</span><span>送付印刷</span></li>
      <li class="nav-item" data-page="history"><span class="nav-ic">&#x25D7;</span><span>送付履歴</span><span class="nav-badge" id="bdg-h">0</span></li>
    </ul>
    <div class="sb-sec">System</div>
    <ul class="nav-list">
      <li class="nav-item" data-page="settings"><span class="nav-ic">&#x25C8;</span><span>設定</span></li>
    </ul>
  </div>
  <div class="sb-footer"><div class="sb-dot"></div><span>v2.1 &nbsp;&#183;&nbsp; 稼働中</span></div>
</nav>

<main id="main">
  <!-- Dashboard -->
  <div id="page-dashboard" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x2B21;</span><span class="pg-rule"></span><span>Dashboard</span></div>
    </div>
    <div class="pg-body" id="dash-body"></div>
  </div>
  <!-- Master -->
  <div id="page-master" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x229E;</span><span class="pg-rule"></span><span>Master Data</span></div>
      <div class="hdr-acts">
        <button class="btn btn-g btn-sm" onclick="exportMasterCSV()">&#x2193; CSV出力</button>
        <button class="btn btn-s btn-sm" onclick="clrImport()" title="マスタをクリアしてから取込">&#x21BA; クリア取込</button>
        <button class="btn btn-p btn-sm" onclick="document.getElementById('csv-in').click()">&#x2191; 取込</button>
        <button class="btn btn-p btn-sm" onclick="addMstRow()">&#xFF0B; 新規追加</button>
        <input type="file" id="csv-in" accept=".csv,.xlsx,.xls" multiple style="display:none">
      </div>
    </div>
    <div class="pg-body">
      <div class="flex ic gap8 mb16">
        <input type="text" class="inp" id="mst-search" placeholder="品番・品名で検索..." oninput="renderMst()" style="max-width:300px">
        <span class="text-sm text-d" id="mst-cnt"></span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th style="width:34px"><input type="checkbox" class="chk" id="chk-all" onchange="togSelAll()"></th>
            <th>品番</th><th>品名</th><th>生地巾</th><th>目付</th><th>混率</th><th>使用糸</th><th>備考</th><th></th>
          </tr></thead>
          <tbody id="mst-tbody"></tbody>
        </table>
      </div>
      <div id="mst-pag" class="flex ic gap8" style="margin-top:16px;justify-content:center"></div>
    </div>
  </div>
  <!-- QR Print -->
  <div id="page-qrprint" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x22A0;</span><span class="pg-rule"></span><span>QR Print</span></div>
      <div class="hdr-acts">
        <span class="text-sm text-d" id="qr-cnt">0 件選択</span>
        <button class="btn btn-g btn-sm" onclick="clrQR()">クリア</button>
        <button class="btn btn-p btn-sm" onclick="printQR()">印刷</button>
      </div>
    </div>
    <div class="pg-body" id="qrprint-body"></div>
  </div>
  <!-- Cases -->
  <div id="page-cases" class="page">
    <div class="pg-hdr">
      <div class="pg-title"><span class="pg-ic">&#x229F;</span><span class="pg-rule"></span><span>Cases</span></div>

/* ═══ CSV / XLSX Import ═══ */
function detectEnc(buf) {
  const b=new Uint8Array(buf);
  if(b[0]===0xEF&&b[1]===0xBB&&b[2]===0xBF) return 'utf-8';
  try { new TextDecoder('utf-8',{fatal:true}).decode(buf); return 'utf-8'; }
  catch(e) { return 'shift-jis'; }
}
function parseCSV(txt) {
  const lines=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  if(lines.length<2) return [];
  const pr=ln=>{const cells=[];let cur='',inQ=false;
    for(let i=0;i<ln.length;i++){
      if(ln[i]==='"'){if(inQ&&ln[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
     else if(ln[i]===','&&!inQ){cells.push(cur);cur='';}
      else cur+=ln[i];
    }cells.push(cur);return cells;};
  const hdrs=pr(lines[0]).map(h=>h.trim().replace(/^﻿/,''));
  const cm=mapCols(hdr else if(ln[i]===','&&!inQ){cells.push(cur);cur='';}
      else cur+=ln[i];
    }cells.push(cur);return cells;};
  const hdrs=pr(lines[0]).map(h=>h.trim().replace(/^﻿/,''));
  const cm=mapCols(hdrs);
  const rows=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const cells=pr(lines[i]);
    const row={品番:'',品名:'',生地巾:'',目付:'',混率:'',使用糸:'',備考:''};
    Object.entries(cm).forEach(([k,idx])=>{if(idx>=0&&idx<cells.length)row[k]=cells[idx].trim();});
    if(row.品番) rows.push(row);
  }
  return rows;
}
function mapCols(hdrs) {
  const m={品番:-1,品名:-1,生地巾:-1,目付:-1,混率:-1,使用糸:-1,備考:-1};
  const pat={品番:/品番|style|item.?no|article/i,品名:/品名|name|desc/i,
    生地巾:/生地巾|幅|width|巾/i,目付:/目付|weight|g\//i,
    混率:/混率|comp|fiber|content/i,使用糸:/使用糸|yarn|糸/i,備考:/備考|memo|note|remark/i};
  hdrs.forEach((h,i)=>{Object.entries(pat).forEach(([k,re])=>{if(m[k]===-1&&re.test(h))m[k]=i;});});
  if(m.品番===-1&&hdrs.length>0) m.品番=0;
  if(m.品名===-1&&hdrs.length>1) m.品名=1;
  return m;
}
async function importCSV(files) {
  let added=0, updated=0;
  for(const f of files) {
    try {
      let rows=[];
      if(/\.xlsx?$/i.test(f.name)) {
        rows=await importXLSX(f);
      } else {
        const buf=await f.arrayBuffer();
        const txt=new TextDecoder(detectEnc(buf)).decode(buf);
        rows=parseCSV(txt);
      }
      rows.forEach(row=>{
        const idx=S.master.findIndex(m=>m.品番===row.品番);
        if(idx>=0){S.master[idx]=row;updated++;}else{S.master.push(row);added++;}
      });
    } catch(e){ console.error(e); toast(f.name+': 読込エラー','err'); }
  }
  saveS(); toast(added+'件追加、'+updated+'件更新','ok'); renderMst(); updBadges();
}
async function importXLSX(file) {
  if(typeof XLSX==='undefined'){toast('XLSXライブラリ読込中。少し待って再試行してください','err');return [];}
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  return parseXLSXKZ(ws);
}
function parseXLSXKZ(ws) {
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  if(!raw||raw.length<2) return [];
  const hdr=raw[0];
  const pnCols=hdr.map((v,i)=>v==='品番'?i:-1).filter(i=>i!==-1);
  if(!pnCols.length) return parseXLSXGeneric(raw);
  const items=[]; const seen=new Set();
  const g=(row,c)=>{const v=c<row.length?row[c]:null;return v!=null?String(v).replace(/　/g,' ').trim():'';};
  const xW=s=>{const m=s.match(/(\d+(?:\.\d+)?)\s*W/);return m?m[1]+'W':''};
  const xG=s=>{const m=s.match(/(\d+(?:\.\d+)?)\s*g\/m/i);return m?m[1]+'g/m':''};
  for(const pnCol of pnCols) {
    const kiCol=pnCol+1,ysCol=pnCol+2,mrCol=pnCol+5,b1Col=pnCol+7,b2Col=pnCol+8;
    let cur=null;
    for(let ri=1;ri<raw.length;ri++){
      const row=raw[ri]; const pn=g(row,pnCol);
      if(pn&&!seen.has(pn)){
        if(cur){items.push(cur);seen.add(cur.品番);}
        const b2=g(row,b2Col);
        cur={品番:pn,品名:g(row,kiCol),生地巾:xW(b2),目付:xG(b2),
             混率:g(row,mrCol).replace(/\s+/g,' '),使用糸:g(row,ysCol),備考:g(row,b1Col)};
      } else if(cur) {
        const ki=g(row,kiCol),ys=g(row,ysCol),b2=g(row,b2Col);
        if(ki&&!/^\d+号$/.test(ki)&&!cur.品名) cur.品名=ki;
        if(ys) cur.使用糸=(cur.使用糸?cur.使用糸+' / ':'')+ys;
        if(b2&&!cur.生地巾){cur.生地巾=xW(b2);cur.目付=xG(b2);}
      }
    }
    if(cur&&!seen.has(cur.品番)){items.push(cur);seen.add(cur.品番);}
  }
  return items;
}
function parseXLSXGeneric(raw) {
  if(raw.length<2) return [];
  const hdrs=raw[0].map(v=>v!=null?String(v).trim():'');
  const cm=mapCols(hdrs); const rows=[];
  for(let i=1;i<raw.length;i++){
    const cells=raw[i].map(v=>v!=null?String(v).replace(/　/g,' ').trim():'');
    const row={品番:'',品名:'',生地巾:'',目付:'',混率:'',使用糸:'',備考:''};
    Object.entries(cm).forEach(([k,idx])=>{if(idx>=0&&idx<cells.length)row[k]=cells[idx];});
    if(row.品番) rows.push(row);
  }
  return rows;
}

/* ═══ QR Generation ═══ */
function genQR(data,size=72){
  if(typeof qrcode==='undefined')
    return '<div style="width:'+size+'px;height:'+size+'px;background:var(--ink-4);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink-7)">QR</div>';
  for(const t of[0,1,2,3,4,5]){
    try{const q=qrcode(t,'M');q.addData(data);q.make();
      const n=q.getModuleCount(),cs=Math.max(1,Math.floor(size/n));
      return q.createSvgTag(cs,0).replace('<svg','<svg style="display:block;width:'+(cs*n)+'px;height:'+(cs*n)+'px"');
    }catch(e){}
  }
  return '<div style="width:'+size+'px;height:'+size+'px;background:var(--ink-4);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ruby)">ERR</div>';
}


function addToCase(code){
  const item=S.master.find(m=>m.品番===code||m.品番===code.toUpperCase());
  if(!item){toast('品番「'+code+'」はマスタに存在しません','err');return;}
  if(!S.activeCaseId){toast('案件を選択してください','err');return;}
  const c=S.cases.find(c=>c.id===S.activeCaseId);if(!c) return;
  const ex=c.items.find(i=>i.品番===item.品番);
  if(ex){ex.qty=(ex.qty||1)+1;toast(item.品番+' — 数量 '+ex.qty,'ok');}
  else{c.items.push({品番:item.品番,qty:1,memo:''});toast(item.品番+' を追加','ok');}
  saveS();renderSL();
}

let mPg=1; const MPSZ=50;
function renderMst(){

  const fil=S.master.filter(m=>!q||m.品番.toLowerCase().includes(q)||m.品名.toLowerCase().includes(q));
  const total=Math.max(1,Math.ceil(fil.length/MPSZ));

      +'<td class="td-dim">'+esc(it.混率)+'</td>'
      +'<td class="td-dim" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">'+esc(it.使用糸||'')+'</td>'
      +'<td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:var(--ink-7)">'+esc(it.備考||'')+'</td>'
      +'<td style="white-space:nowrap">' +'<button class="btn btn-g btn-xs" onclick="addToCase(\''+esc(it.品番)+'\')" title="案件に追加">&#xFF0B;</button> ' +'<button class="btn btn-g btn-xs" onclick="editMst(\''+esc(it.品番)+'\')">&#x270E;</button> ' +'<button class="btn btn-d btn-xs" onclick="delMst(\''+esc(it.品番)+'\')" style="margin-left:1px">&#x2715;</button>'+'</td></tr>'
    ).join('');
  }
  const pag=document.getElementById('mst-pag');
  if(pag){
    if(total<=1){pag.innerHTML='';return;}
    let h='';
    if(mPg>1) h+='<button class="btn btn-g btn-xs" onclick="goMP('+(mPg-1)+')">&#x2190;</button>';

    h+='<span class="text-xs text-d">'+mPg+'/'+total+'ページ</span>';
    pag.innerHTML=h;
  }
}

function saveMstAdd(){
  const code=(document.getElementById('ma_品番')?.value||'').trim().toUpperCase();
  if(!code){toast('品番は必須です','err');return;}
  if(S.master.find(m=>m.品番===code)){toast('「'+code+'」は既に存在します','err');return;}
  const row={};
  ['品番','品名','生地巾','目付','混率','使用糸','備考'].forEach(k=>{
    const el=document.getElementById('ma_'+k);
    row[k]=el?(k==='品番'?el.value.trim().toUpperCase():el.value.trim()):'';
  });
  S.master.unshift(row);
  saveS();updBadges();closeModal();mPg=1;renderMst();
  toast(code+' を追加しました','ok');
}
function togSelAll(){
  const ck=document.getElementById('chk-all')?.checked;
  const q=(document.getElementById('mst-search')?.value||'').toLowerCase();
  S.master.filter(m=>!q||m.品番.toLowerCase().includes(q)||m.品名.toLowerCase().includes(q))
    .slice((mPg-1)*MPSZ,mPg*MPSZ)
    .forEach(it=>{ck?S.qrSel.add(it.品番):S.qrSel.delete(it.品番);});
  renderMst(); updQC();
}
function togQR(code,ck){ck?S.qrSel.add(code):S.qrSel.delete(code);updQC();}
function updQC(){const el=document.getElementById('qr-cnt');if(el)el.textContent=S.qrSel.size+' 件選択';}

function printQR(){

  const items=[...S.qrSel].map(c=>S.master.find(m=>m.品番===c)).filter(Boolean);

      const qd=S.settings.qrUrl?S.settings.qrUrl.replace(/\/$/,'')+'/'+it.品番:it.品番;

function setAC(id){S.activeCaseId=id;saveS();renderCases();updBadges();toast('アクティブ案件を設定しました','ok');}
function showCD(id){
  const c=S.cases.find(c=>c.id===id); if(!c) return;
  const tq=c.items.reduce((s,i)=>s+(i.qty||1),0);
  const rows=c.items.map(it=>{
    const m=S.master.find(m=>m.品番===it.品番)||{};
    return '<div class="sl-row"><div><div class="td-mono" style="font-size:12px">'+esc(it.品番)+'</div>'
      +'<div class="text-xs text-d">'+esc(m.品名||'')+'</div></div>'
      +'<input type="number" class="inp" value="'+(it.qty||1)+'" min="1" style="padding:4px 8px;font-size:12px" onchange="updQ(\''+id+'\',\''+esc(it.品番)+'\',this.value)">'
      +'<input type="text" class="inp" value="'+esc(it.memo||'')+'" placeholder="メモ" style="padding:4px 8px;font-size:11px" onchange="updM(\''+id+'\',\''+esc(it.品番)+'\',this.value)">'
      +'<button class="btn btn-d btn-xs" onclick="rmI(\''+id+'\',\''+esc(it.品番)+'\')">&#x2715;</button></div>';
  }).join('')||'<div class="empty" style="padding:24px 0"><div class="empty-txt">リストが空です</div></div>';
  showModal('<div class="modal-ttl">'+esc(c.name)+'</div>'
    +'<div class="text-d text-xs mb16">'+esc(c.client||'')+(c.client?' &nbsp;&#183;&nbsp; ':'')+c.items.length+'品番 / '+tq+'点</div>'
    +'<div style="max-height:340px;overflow-y:auto">'+rows+'</div>'
    +'<div class="divider"></div>'
    +'<div class="flex gap8" style="flex-wrap:wrap">'
    +'<button class="btn btn-g btn-sm" onclick="cpTxt(\''+id+'\')">テキストコピー</button>'
    +'<button class="btn btn-g btn-sm" onclick="expCase(\''+id+'\')">&#x2193; CSV</button>'
    +'<button class="btn btn-p btn-sm" onclick="setAC(\''+id+'\');nav(\'labels\');closeModal()">&#x22A1; 送付印刷</button>'
    +'<button class="btn btn-g btn-sm" style="margin-left:auto" onclick="closeModal()">閉じる</button>'
    +'</div>');
}
function updQ(cid,code,v){const c=S.cases.find(c=>c.id===cid);if(!c)return;const it=c.items.find(i=>i.品番===code);if(it){it.qty=Math.max(1,parseInt(v)||1);saveS();}}
function updM(cid,code,v){const c=S.cases.find(c=>c.id===cid);if(!c)return;const it=c.items.find(i=>i.品番===code);if(it){it.memo=v;saveS();}}
function rmI(cid,code){const c=S.cases.find(c=>c.id===cid);if(!c)return;c.items=c.items.filter(i=>i.品番!==code);saveS();showCD(cid);}
function cpTxt(id){
  const c=S.cases.find(c=>c.id===id); if(!c) return;
  const lines=['【'+c.name+'】'+(c.client?' — '+c.client:''),''];
  c.items.forEach(it=>{const m=S.master.find(m=>m.品番===it.品番)||{};lines.push(it.品番+'  '+(m.品名||'')+'  ×'+(it.qty||1)+(it.memo?'  ('+it.memo+')':''));});
  lines.push('','合計 '+c.items.length+'品番 / '+c.items.reduce((s,i)=>s+(i.qty||1),0)+'点');
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('コピーしました','ok'));
}
function expCase(id){
  const c=S.cases.find(c=>c.id===id); if(!c) return;
  const h=['品番','品名','生地巾','目付','混率','数量','メモ'];
  const rows=c.items.map(it=>{const m=S.master.find(m=>m.品番===it.品番)||{};return[it.品番,m.品名||'',m.生地巾||'',m.目付||'',m.混率||'',it.qty||1,it.memo||''];});
  const csv=[h.join(','),...rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))].join('\n');
  dl('﻿'+csv,c.name+'_送付リスト.csv','text/csv;charset=utf-8');
}
function delCase(id){
  if(!confirm('この案件を削除しますか？')) return;
  S.cases=S.cases.filter(c=>c.id!==id);
  if(S.activeCaseId===id) S.activeCaseId=S.cases[0]?.id||null;
  saveS();renderCases();updBadges();toast('削除しました');
}

function renderLP(){
  const area=document.getElementById('lbl-preview'); if(!area) return;
  const cid=document.getElementById('lbl-sel')?.value;
  const c=cid?S.cases.find(c=>c.id===cid):null;

    return;
  }
  const items=buildLblItems(c);
  const pages=[];for(let i=0;i<items.length;i+=6)pages.push(items.slice(i,i+6));

   +items.length+'枚 / '+pages.length+'ページ（A4 / 6枚）</span></div>'

      let rows='';
      for(let li=0;li<6;li++){

        rows+='<div class="lbl2-sep">'+SEP+'</div>'
          +'<div class="lbl2-cell">'

          +'</div>';

function buildLblItems(c){
  const items=[];
  c.items.forEach(it=>{
    const m=S.master.find(m=>m.品番===it.品番)||{品番:it.品番};
    for(let i=0;i<(it.qty||1);i++) items.push({...m,_memo:it.memo||''});
  });
  return items;
}
function lblItemHtml(it){
  const fields=[
    {key:'Yarn Count',  val:it?it.使用糸:''},
    {key:'Composition', val:it?it.混率:''},
    {key:'Width',       val:it?it.生地巾:''},
    {key:'Weight',      val:it?it.目付:''},
    {key:'Item No.',    val:it?it.品番:''},
    {key:'Name',        val:it?it.品名:''},
  ];
  return fields.map(f=>
    '<div class="lbl-frow">'
    +'<span class="lbl-fkey">'+f.key+'</span>'
    +'<span style="font-size:9px;color:var(--sand-4);margin-right:4px">：</span>'
    +'<span class="lbl-fval">'+esc(f.val||'')+'</span>'
    +'</div>'
  ).join('');
}
function printAndSave(){
  const cid=document.getElementById('lbl-sel')?.value;
  const c=cid?S.cases.find(c=>c.id===cid):null;
  if(!c||!c.items.length){toast('案件を選択してください','err');return;}
  const to=(document.getElementById('lbl-to')?.value||'').trim();
  if(!to){toast('送り先を入力してください','err');return;}
  const person=(document.getElementById('lbl-person')?.value||'').trim();
  const sentDate=document.getElementById('lbl-date')?.value||new Date().toISOString().slice(0,10);
  const note=(document.getElementById('lbl-note')?.value||'').trim();
  const rec={id:'hist_'+Date.now(),sentAt:Date.now(),sentDate,
    recipient:to,contact:person,note,
    caseName:c.name,caseId:c.id,
    items:c.items.map(it=>({...it}))};
  S.history.unshift(rec);saveS();updBadges();
  execPrint(c,rec);
  toast('印刷を開始し、送付履歴に保存しました','ok');
}
function execPrint(c,info){
  const items=buildLblItems(c);
  const pages=[];for(let i=0;i<items.length;i+=6)pages.push(items.slice(i,i+6));
  const FS="'游明朝 Light','Yu Mincho Light','YuMincho','游明朝','HiraMinProN-W3','Hiragino Mincho ProN','Georgia',serif";
  const FG="'游ゴシック','Yu Gothic','YuGothic','Noto Sans JP','Hiragino Sans',sans-serif";
  const SEP='－'.repeat(40);
  const RH='6mm';
  const BDR='border-bottom:0.4pt solid #ccc';
  const FIELDS=[
    {key:'Yarn Count', prop:'使用糸'},
    {key:'Composition',prop:'混率'},
    {key:'Width',      prop:'生地巾'},
    {key:'Weight',     prop:'目付'},
    {key:'Item No.',   prop:'品番'},
    {key:'Name',       prop:'品名'},
  ];
  const makeSep=()=>
    '<tr><td colspan="4" style="height:'+RH+';font-family:'+FG+';font-size:11pt;'
    +'text-align:center;vertical-align:middle;padding:0;white-space:nowrap;overflow:hidden;letter-spacing:0">'
    +SEP+'</td></tr>';
  const makeLabel=it=>
    FIELDS.map((f,i)=>
      '<tr>'
      +'<td style="height:'+RH+';font-family:'+FS+';font-size:9pt;vertical-align:middle;'
      +'padding:0 1mm 0 0;'+BDR+';white-space:nowrap;overflow:hidden">'+f.key+'</td>'
      +'<td style="height:'+RH+';font-family:'+FS+';font-size:9pt;vertical-align:middle;'
      +'text-align:center;padding:0;'+BDR+'">：</td>'
      +'<td style="height:'+RH+';font-family:'+FS+';font-size:9pt;vertical-align:middle;'
      +'padding:0 1mm;'+BDR+';white-space:nowrap;overflow:hidden">'
      +esc(it?it[f.prop]||'':'')+'</td>'
      +(i===0?'<td rowspan="6" style="border:none;vertical-align:top;padding:0"></td>':'')
      +'</tr>'
    ).join('');
  const html=pages.map((pg,pi)=>{
    let body='';
    for(let li=0;li<6;li++) body+=makeSep()+makeLabel(pg[li]||null);
    body+=makeSep();
    return '<div'+(pi<pages.length-1?' style="page-break-after:always"':'')+'>'
      +'<table style="width:174mm;margin:0;border-collapse:collapse;table-layout:fixed">'
      +'<colgroup><col style="width:26mm"><col style="width:7mm">'
      +'<col style="width:80mm"><col style="width:61mm"></colgroup>'
      +'<tbody>'+body+'</tbody></table></div>';
  }).join('');
  opPrint(html);
}

        +'<div class="flex gap8" style="padding-top:12px;border-top:1px solid var(--ink-4)">'
        +'<button class="btn btn-g btn-sm" onclick="reprintHistory(\''+h.id+'\')">&#x21BB; 再印刷</button>'
        +'<button class="btn btn-g btn-sm" onclick="expHistCSV(\''+h.id+'\')">&#x2193; CSV</button>'
        +'</div></div>';
    }).join('')+'</div>';
}
function delHistory(id){
  if(!confirm('この送付履歴を削除しますか？')) return;
  S.history=S.history.filter(h=>h.id!==id);
  saveS();updBadges();renderHistory();toast('削除しました');
}
function reprintHistory(id){
  const h=S.history.find(h=>h.id===id); if(!h) return;
  execPrint({name:h.caseName,items:h.items},h);
}
function expHistCSV(id){
  const h=S.history.find(h=>h.id===id); if(!h) return;
  const cols=['品番','品名','混率','生地巾','目付','使用糸','数量','メモ'];
  const rows=h.items.map(it=>{
    const m=S.master.find(m=>m.品番===it.品番)||{};
    return[it.品番,m.品名||'',m.混率||'',m.生地巾||'',m.目付||'',m.使用糸||'',it.qty||1,it.memo||''];
  });
  const csv=[cols.join(','),...rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','))].join('\n');
  dl('﻿'+csv,h.recipient+'_'+h.sentDate+'_送付リスト.csv','text/csv;charset=utf-8');
}

/* ═══ Settings ═══ */
function renderSettings(){
  document.getElementById('settings-body').innerHTML=
    '<div style="max-width:500px;display:flex;flex-direction:column;gap:14px">'
    +'<div class="card"><div class="card-hd">General</div>'
    +'<div class="inp-row"><label class="inp-lbl">自社名（ラベル印字）</label>'
    +'<input type="text" class="inp" id="s-co" value="'+esc(S.settings.companyName||'')+'"></div>'
    +'<div class="inp-row"><label class="inp-lbl">QR 用 URL（任意）</label>'
    +'<input type="text" class="inp" id="s-url" value="'+esc(S.settings.qrUrl||'')+'" placeholder="https://example.com/fabric/">'
    +'<div class="inp-hint">設定するとQRコードに「URL/品番」が埋め込まれます</div></div></div>'
    +'<div class="card"><div class="card-hd">Data Management</div>'
    +'<div class="flex gap8 mb16" style="flex-wrap:wrap">'
    +'<button class="btn btn-g btn-sm" onclick="exportMasterCSV()">&#x2193; マスタCSV出力</button>'
    +'<button class="btn btn-d btn-sm" onclick="clrAll()">全データ削除</button></div>'
    +'<div class="text-xs" style="color:var(--ink-7);line-height:1.8">'
    +'マスタ: <span class="text-a">'+S.master.length+'</span> 品番 &nbsp;&#183;&nbsp; '
    +'案件: <span class="text-a">'+S.cases.length+'</span> 件 &nbsp;&#183;&nbsp; '
    +'送付履歴: <span class="text-a">'+S.history.length+'</span> 件 &nbsp;&#183;&nbsp; '
    +'保存先: localStorage</div></div>'
    +'<div class="card"><div class="card-hd">About</div>'
    +'<div class="text-xs" style="color:var(--ink-7);line-height:2">'
    +'FABRIC QR SYSTEM v2.1<br>'
    +'送付印刷・送付履歴対応版<br>'
    +'ブラウザで動作する単一HTMLファイル。インストール不要。<br>'
    +'</div></div>'
    +'</div>';
}
function saveSettings(){
  S.settings.companyName=document.getElementById('s-co')?.value||'';
  S.settings.qrUrl=document.getElementById('s-url')?.value||'';
  saveS();toast('設定を保存しました','ok');
}
function clrAll(){
  if(!confirm('全データを削除しますか？元に戻せません。')) return;
  S.master=[];S.cases=[];S.history=[];S.activeCaseId=null;
  saveS();updBadges();renderSettings();toast('データを削除しました');
}

/* ═══ Modal ═══ */
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-bg').classList.add('on');}
function closeModal(){document.getElementById('modal-bg').classList.remove('on');}
function showNCM(){
  showModal('<div class="modal-ttl">新規案件作成</div>'
    +'<div class="inp-row"><label class="inp-lbl">案件名 <span style="color:var(--ruby)">*</span></label>'
    +'<input type="text" class="inp" id="nc-name" placeholder="例：2025春夏展示会"></div>'
    +'<div class="inp-row"><label class="inp-lbl">顧客名</label>'
    +'<input type="text" class="inp" id="nc-client" placeholder="例：ABC商事"></div>'
    +'<div class="modal-acts">'
    +'<button class="btn btn-g" onclick="closeModal()">キャンセル</button>'
    +'<button class="btn btn-p" onclick="createCase()">作成</button>'
    +'</div>');
  setTimeout(()=>document.getElementById('nc-name')?.focus(),60);
}
function createCase(){
  const name=document.getElementById('nc-name')?.value.trim();
  if(!name){toast('案件名を入力してください','err');return;}
  const client=document.getElementById('nc-client')?.value.trim();
  const nc={id:'case_'+Date.now(),name,client,createdAt:Date.now(),items:[]};
  S.cases.unshift(nc);S.activeCaseId=nc.id;saveS();closeModal();updBadges();
  toast('「'+name+'」を作成しました','ok');
  if(S.page==='cases') renderCases();
  if(S.page==='dashboard') renderDash();
}

/* ═══ Print ═══ */
function opPrint(body){
  const w=window.open('','_blank','width=960,height=720');
  if(!w){toast('ポップアップをブロックしてください','err');return;}
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}'
    +'body{background:white;font-family:\'游明朝 Light\',\'Yu Mincho Light\',\'YuMincho\',\'游明朝\',Georgia,serif}'
    +'@page{size:A4 portrait;margin:19mm 18mm}'
    +'@media print{body{margin:0}table{-webkit-print-color-adjust:exact;print-color-adjust:exact}}'
    +'</style>'
    +'</head><body>'+body
    +'<'+'script>window.onload=()=>setTimeout(()=>{window.print();window.close();},400);<'+'/script>'
    +'</body></html>');
  w.document.close();
}

/* ═══ Badges & Utils ═══ */
function updBadges(){
  const bm=document.getElementById('bdg-m');if(bm)bm.textContent=S.master.length>999?'999+':S.master.length;
  const bc=document.getElementById('bdg-c');if(bc)bc.textContent=S.cases.length;
  const bh=document.getElementById('bdg-h');if(bh)bh.textContent=S.history.length;
}

/* ═══ Drag & Drop ═══ */
function setupDrop(){
  document.addEventListener('dragover',e=>e.preventDefault());
  document.addEventListener('drop',e=>{
    e.preventDefault();
    if(S.page!=='master') return;
    const files=[...e.dataTransfer.files].filter(f=>/\.(csv|xlsx?)$/i.test(f.name));
    if(files.length) importCSV(files);
  });
  document.getElementById('csv-in').addEventListener('change',e=>{
    const files=[...e.target.files];if(files.length)importCSV(files);e.target.value='';
  });
}

/* ═══ Init ═══ */
function init(){
  loadS();
  document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>nav(el.dataset.page)));
  document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
  setupDrop();
  nav('dashboard');

}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
